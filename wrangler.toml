name = "mailfree"
main = "src/server.js"
compatibility_date = "2025-04-01"
workers_dev = true

# 自定义域名路由
routes = [
  { pattern = "mail.codewith.site/*", zone_name = "codewith.site" },
  { pattern = "freemail.best/*", zone_name = "freemail.best" },
]

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db"
database_id = "9ed54bdc-edf1-4de0-9eed-c1b26825c946"

# 环境变量（公开变量放这里，密钥用 wrangler secret put）
[vars]
MAIL_DOMAIN    = "freemail.best,codewith.site"  # 多域名: 新域名优先
ADMIN_NAME     = "admin"                  # 管理员用户名
LANDING_PUBLIC = "true"                   # Landing Page 匿名访问开关
MAIL_EXPIRE_HOURS = "24"                 # 邮件自动过期时间（小时）

# 以下密钥需通过 wrangler secret put 设置:
# ADMIN_PASSWORD  - 管理员密码
# JWT_TOKEN       - JWT 签名密钥（随机字符串）
# GUEST_PASSWORD  - 访客密码（可选）
# RESEND_API_KEY  - Resend 发件密钥，支持多域名格式: domain1=key1,domain2=key2
# MS_ACCOUNTS     - 微软邮箱配置，JSON数组格式:
#   [{"email":"user@outlook.com","tenantId":"xxx","clientId":"xxx","clientSecret":"xxx"}]
#   支持多账号，系统根据发件地址自动匹配

# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = true

# R2 存储桶绑定（保存完整 EML）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

# 定时任务：每小时自动清理过期邮件
[triggers]
crons = ["0 * * * *"]

# 日志
[observability]
enabled = true
